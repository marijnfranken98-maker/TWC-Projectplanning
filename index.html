<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>TWC Jaarplanning 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1920px;height:1080px;overflow:hidden;background:#141414;color:#f0f0f0;font-family:'Segoe UI',Arial,sans-serif}
.page{width:1920px;height:1080px;padding:22px 28px;display:flex;flex-direction:column;gap:14px}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;background:#1e1e1e;border-left:6px solid #C45B0E;padding:14px 20px;border-radius:3px;flex-shrink:0}
.header h1{font-size:17px;font-weight:600;color:#fff;letter-spacing:.4px}
.header-sub{font-size:11px;color:#666;margin-top:3px}
.header-right{font-size:13px;color:#C45B0E;font-weight:700;text-align:right}
.header-right span{display:block;color:#555;font-weight:400;font-size:11px;margin-top:2px}

/* MAIN LAYOUT */
.main{display:flex;gap:14px;flex:1;min-height:0}

/* GANTT */
.gantt-panel{flex:1;display:flex;flex-direction:column;min-width:0}
.panel-label{font-size:10px;font-weight:700;color:#555;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.gantt-scroll{flex:1;overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:11px;font-weight:600;padding:8px 4px;text-align:center;color:#666;background:#1a1a1a;border-bottom:2px solid #111;letter-spacing:.4px}
th.lbl{text-align:left;padding-left:10px;color:#999;width:170px}
th.lbl2{text-align:left;padding-left:8px;color:#777;width:220px;font-weight:400}
th.cur{background:#C45B0E;color:#fff;font-weight:700}
td{font-size:11px;padding:2px 3px;border-bottom:1px solid #1e1e1e}
tr:hover td{background:rgba(255,255,255,.02)}
td.lbl{padding:5px 10px;font-weight:600;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:#1c1c1c;border-right:1px solid #111}
td.lbl2{padding:5px 8px;color:#777;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:#1c1c1c;font-size:10px;border-right:1px solid #111}
td.mc{padding:2px 2px;background:#181818}
td.cur-c{background:#1f1208}
.bar{display:block;width:100%;padding:4px 6px;border-radius:3px;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
.bk{background:#3d1f07;color:#e8934a;border:1px solid #5a3010}
.bs{background:#0d2440;color:#5b9bd5;border:1px solid #1a3f6e}
.mid{color:#555;text-align:center;font-size:11px;display:block;padding:4px}
.cnt-row td{background:#111;font-size:12px;font-weight:700;padding:6px 4px;text-align:center;color:#C45B0E;border-top:2px solid #0a0a0a}
.cnt-row td.lbl,.cnt-row td.lbl2{color:#444;text-align:left;font-size:10px;background:#111}

/* ENGINEER PANEL */
.eng-panel{width:360px;flex-shrink:0;display:flex;flex-direction:column}
.eng-grid{display:grid;gap:4px;flex:1}
.eng-head-row{display:grid;gap:3px;margin-bottom:5px}
.eng-row{display:grid;gap:3px;align-items:center}
.eng-name{font-size:11px;font-weight:600;color:#bbb;padding:5px 10px;background:#1e1e1e;border-radius:3px;white-space:nowrap;overflow:hidden}
.ec{text-align:center;font-size:12px;font-weight:700;padding:5px 2px;border-radius:3px}
.eh{font-size:9px;font-weight:600;text-align:center;color:#555;padding:5px 2px;background:#1a1a1a;border-radius:3px;letter-spacing:.3px}
.eh.cur{background:#C45B0E;color:#fff}
.e0{background:#181818;color:#333}
.e1,.e2{background:#1a3d25;color:#4caf50}
.e3{background:#3d2800;color:#ff9800}
.e4{background:#3d0a0a;color:#f44336}

/* LEGENDA */
.legend{display:flex;gap:16px;align-items:center;flex-shrink:0;padding-top:4px;border-top:1px solid #222}
.li{display:flex;align-items:center;gap:5px;font-size:10px}
.ld{width:14px;height:10px;border-radius:2px}
</style>
</head>
<body>
<!--
================================================================
  PROJECTDATA - HIER AANPASSEN (open in Kladblok of Notepad++)
================================================================

  Velden per project:
  k = Klantnaam
  p = Projectnaam
  e = Engineers (kommagescheiden)
  t = "Klant" of "Sales"
  s = Startmaand (1=Jan t/m 12=Dec)
  n = Eindmaand
  x = "" = actief  /  "Afgerond" = wordt niet getoond

  Na aanpassen: opslaan en opnieuw uploaden naar GitHub.
  De URL in Scala blijft hetzelfde.
================================================================
-->
<script>
const DATA=[
  {k:"ASV Automobielbedrijven",  p:"Vervanging infrastructuur",    e:"Mitchell, Dennis",  t:"Klant",s:1,n:4,x:""},
  {k:"Connection-SGGZ",          p:"RBAC-Datamigratie Sharepoint",  e:"Mitchell, Jelle B", t:"Klant",s:2,n:4,x:""},
  {k:"Kloosterhotel ZIN",        p:"TWC Workplace",                 e:"Ron, Dennis",       t:"Klant",s:1,n:4,x:""},
  {k:"Kloosterhotel ZIN",        p:"Vervanging Netwerk",            e:"Ron, Dennis",       t:"Klant",s:4,n:6,x:""},
  {k:"PGZ Service",              p:"PCB Aanpassen infra",           e:"Dennis",            t:"Klant",s:2,n:4,x:""},
  {k:"PGZ Service",              p:"Vervanging netwerk PCM",        e:"Dennis, Mitchell",  t:"Klant",s:2,n:4,x:""},
  {k:"Geeqs",                    p:"Vervanging netwerk",            e:"Tom, Luke, Dennis", t:"Klant",s:3,n:4,x:""},
  {k:"Van Doorne's Machinefab.", p:"Vervanging server",            e:"Stef L, Dennis",    t:"Klant",s:3,n:4,x:""},
  {k:"Econox B.V.",              p:"Migratie Productieomgeving",    e:"Jan-Jaap",          t:"Klant",s:4,n:5,x:""},
  {k:"Econox B.V.",              p:"Vervanging Netwerk",            e:"NNB",               t:"Sales",s:4,n:6,x:""},
  {k:"Geevers Auto Parts",       p:"Verhuizing Westfield 1010",     e:"Bas, Mitchell",     t:"Sales",s:4,n:9,x:""},
  {k:"Leermakers Accountants",   p:"FDS migratie",                 e:"Dennis",            t:"Klant",s:4,n:5,x:""},
  {k:"Synaxion B.V.",            p:"Uitfaseren Servers",            e:"Bas",               t:"Klant",s:4,n:5,x:""},
  {k:"TBRM Group B.V.",          p:"Blueprint startups",            e:"NNB",               t:"Sales",s:4,n:5,x:""},
  {k:"TBRM Group B.V.",          p:"Vervanging hardware",           e:"NNB",               t:"Sales",s:4,n:5,x:""},
  {k:"Th. Van Kasteren",         p:"TWC Workplace + Server",        e:"Bas",               t:"Sales",s:4,n:5,x:""},
  {k:"Diego",                    p:"TWC 365Beheer",                 e:"NNB",               t:"Sales",s:5,n:6,x:""},
  {k:"EFTiN",                    p:"TWC365Beheer",                  e:"NNB",               t:"Sales",s:5,n:5,x:""},
  {k:"Metabletica",              p:"TWC Workplace",                 e:"NNB",               t:"Sales",s:6,n:7,x:""},
  {k:"Bazelmans AV",             p:"Netwerk vervanging",            e:"Luke, Dennis",      t:"Sales",s:3,n:3,x:""},
  {k:"Geeqs",                    p:"TWC Workplace",                 e:"Luke, Tom",         t:"Sales",s:12,n:12,x:""},
  {k:"AddIT",                    p:"Uitfaseren datacenter",         e:"Bas, Dennis",       t:"Klant",s:2,n:3,x:"Afgerond"},
  {k:"Econox B.V.",              p:"TWC Workplace",                 e:"Joei",              t:"Klant",s:1,n:3,x:"Afgerond"},
  {k:"Fraters CMM",              p:"Verhuizing Schiphollaan 30",    e:"Tom",               t:"Klant",s:1,n:2,x:"Afgerond"},
  {k:"Hoogerdijk Technical",     p:"TWC Workplace",                 e:"Bas, Jelle B",      t:"Klant",s:1,n:2,x:"Afgerond"},
  {k:"PGZ Service",              p:"Windows 11 VDA upgrade",       e:"Dennis, Ron",       t:"Klant",s:1,n:2,x:"Afgerond"},
  {k:"Van Diessen Keukens",      p:"Vervangen servers",             e:"Tom",               t:"Klant",s:1,n:2,x:"Afgerond"},
];

const ENG=["Bas","Dennis","Mitchell","Jelle B","Tom","Luke","Ron","Jan-Jaap","Joei","Stef L"];
const MSS=["Jan","Feb","Mrt","Apr","Mei","Jun","Jul","Aug","Sep","Okt","Nov","Dec"];
const MSF=["Januari","Februari","Maart","April","Mei","Juni","Juli","Augustus","September","Oktober","November","December"];
const CUR=new Date().getMonth()+1; // automatisch huidige maand
</script>

<div class="page">
  <div class="header">
    <div>
      <h1>JAARPLANNING PROJECTEN 2026 &nbsp;|&nbsp; TWC IT Solutions</h1>
      <div class="header-sub">Bijgewerkt: <span id="datum"></span></div>
    </div>
    <div class="header-right" id="cur-lbl"></div>
  </div>

  <div class="main">
    <!-- GANTT -->
    <div class="gantt-panel">
      <div class="panel-label">Projectplanning</div>
      <div class="gantt-scroll">
        <table id="gtbl"></table>
      </div>
    </div>

    <!-- ENGINEERS -->
    <div class="eng-panel">
      <div class="panel-label">Engineer belasting</div>
      <div class="eng-head-row" id="eg-head"></div>
      <div class="eng-grid" id="eg-grid"></div>
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:5px">
        <div class="li"><span class="ld" style="background:#1a3d25"></span><span style="color:#4caf50">1-2 projecten &nbsp;ok</span></div>
        <div class="li"><span class="ld" style="background:#3d2800"></span><span style="color:#ff9800">3 projecten &nbsp;druk</span></div>
        <div class="li"><span class="ld" style="background:#3d0a0a"></span><span style="color:#f44336">4+ projecten &nbsp;overbelast</span></div>
      </div>
    </div>
  </div>

  <div class="legend">
    <span style="font-size:10px;color:#444;font-weight:600;letter-spacing:.5px">LEGENDA</span>
    <span class="li"><span class="ld" style="background:#3d1f07;border:1px solid #5a3010"></span><span style="color:#e8934a">Klant-project</span></span>
    <span class="li"><span class="ld" style="background:#0d2440;border:1px solid #1a3f6e"></span><span style="color:#5b9bd5">Sales-project</span></span>
    <span style="font-size:10px;color:#333;margin-left:auto">Oranje kolom = huidige maand &nbsp;|&nbsp; NNB-projecten en afgeronde projecten worden niet getoond</span>
  </div>
</div>

<script>
const MONTHS = [];
for(let m=CUR;m<=12;m++) MONTHS.push(m); // alleen huidige t/m december

// Alleen actieve projecten die nog lopen (einddatum >= huidige maand, niet afgerond)
const active = DATA
  .filter(p => p.x !== 'Afgerond' && p.n >= CUR && p.s <= 12)
  .sort((a,b) => a.s - b.s || a.k.localeCompare(b.k));

// Kolombreedtes berekenen
const nMonths = MONTHS.length; // bijv. 9 (apr-dec)
// Totale breedte beschikbaar voor maandkolommen (na aftrek klant+project kolom)
// Klant=170px Project=220px Engineer panel=360px + gaps
// Gantt breedte = 1920 - 56(padding) - 14(gap) - 360(eng) = 1490px
// Klant+Project = 390px, rest voor maanden
// Maar we gebruiken table-layout:fixed, dus gewoon auto verdelen

function buildGantt(){
  const colgroup = MONTHS.map(()=>'<col>').join('');
  let h = `<colgroup><col style="width:170px"><col style="width:220px">${colgroup}</colgroup>`;
  h += '<thead><tr><th class="lbl">Klant</th><th class="lbl2">Project</th>';
  MONTHS.forEach(m => {
    h += `<th class="${m===CUR?'cur':''}">${MSS[m-1]}</th>`;
  });
  h += '</tr></thead><tbody>';

  active.forEach(p => {
    h += '<tr>';
    h += `<td class="lbl" title="${p.k}">${p.k}</td>`;
    h += `<td class="lbl2" title="${p.p}">${p.p}</td>`;
    MONTHS.forEach(m => {
      const isCur = m === CUR;
      h += `<td class="mc${isCur?' cur-c':''}">`;
      if(m >= p.s && m <= p.n){
        const bc = p.t==='Klant' ? 'bk' : 'bs';
        const label = m === p.s ? p.e : '&middot;';
        h += `<span class="bar ${bc}" title="${p.e}">${label}</span>`;
      }
      h += '</td>';
    });
    h += '</tr>';
  });

  // Telrij
  h += '<tr class="cnt-row"><td class="lbl">Actief</td><td class="lbl2"></td>';
  MONTHS.forEach(m => {
    const cnt = active.filter(p => p.s<=m && p.n>=m).length;
    h += `<td>${cnt||''}</td>`;
  });
  h += '</tr></tbody>';
  document.getElementById('gtbl').innerHTML = h;
}

function buildEng(){
  // Hoogte berekenen: beschikbaar = 1080 - header(~72) - legend(~34) - gaps(~50) - panellabel(~24) = ~900px
  // Per engineer: name + cells. We have 10 engineers.
  const engCols = `130px repeat(${nMonths},1fr)`;

  // Header
  let hh = `<div style="display:grid;grid-template-columns:${engCols};gap:3px">`;
  hh += '<div class="eh" style="text-align:left;padding-left:8px;background:none;color:#444">Engineer</div>';
  MONTHS.forEach(m => {
    hh += `<div class="eh${m===CUR?' cur':''}">${MSS[m-1]}</div>`;
  });
  hh += '</div>';
  document.getElementById('eg-head').innerHTML = hh;

  // Grid
  document.getElementById('eg-grid').style.gridTemplateColumns = '1fr';
  document.getElementById('eg-grid').innerHTML = ENG.map(eng => {
    let r = `<div class="eng-row" style="grid-template-columns:${engCols}">`;
    r += `<div class="eng-name">${eng}</div>`;
    MONTHS.forEach(m => {
      const cnt = active.filter(p =>
        p.e.toLowerCase().includes(eng.toLowerCase()) && p.s<=m && p.n>=m
      ).length;
      const cls = cnt===0?'e0':cnt<=2?'e1':cnt===3?'e3':'e4';
      r += `<div class="ec ${cls}">${cnt||''}</div>`;
    });
    r += '</div>';
    return r;
  }).join('');
}

// Header info
const now = new Date();
document.getElementById('datum').textContent = now.toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
document.getElementById('cur-lbl').innerHTML = `Huidige maand<span>${MSF[CUR-1]} ${now.getFullYear()}</span>`;

buildGantt();
buildEng();
</script>
</body>
</html>
