<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>TWC Projectplanning 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Calibri, Arial, sans-serif;
    background: #EFEFEF;
    color: #2E2E2E;
    min-height: 100vh;
    padding: 20px 24px;
  }

  .page { max-width: 1872px; margin: 0 auto; }

  /* HEADER */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    background: #fff; border-left: 5px solid #C45B0E;
    padding: 14px 22px; margin-bottom: 14px; border-radius: 3px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .header-left h1 { font-size: 17px; font-weight: 700; color: #2E2E2E; }
  .header-left p  { font-size: 11px; color: #AAA; margin-top: 3px; }
  .header-right .cur-month { font-size: 13px; font-weight: 700; color: #C45B0E; text-align:right; }
  .header-right .meta { font-size: 10px; color: #BBB; margin-top: 2px; text-align:right; }

  /* LEGEND */
  .legend {
    display: flex; gap: 18px; align-items: center;
    padding: 8px 14px; background: #fff; border-radius: 3px;
    margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    font-size: 10.5px; color: #777;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot  { width: 13px; height: 13px; border-radius: 2px; flex-shrink: 0; }
  .dot-klant   { background: #C45B0E; }
  .dot-sales   { background: #1A6FB5; }
  .dot-past    { background: #CCC; }
  .legend .right { margin-left: auto; font-size: 9.5px; color: #CCC; }

  /* TABLE */
  .grid-wrap {
    background: #fff; border-radius: 4px;
    box-shadow: 0 1px 6px rgba(0,0,0,.09); overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  .col-klant   { width: 195px; }
  .col-project { width: 235px; }
  .col-month   { width: calc((100% - 430px) / 12); min-width: 62px; }

  thead tr th {
    background: #3C3C3C; font-size: 10px; font-weight: 700;
    color: #AAA; padding: 9px 4px; text-align: center;
    border-right: 1px solid #484848;
    position: sticky; top: 0; z-index: 10;
    letter-spacing: .5px; text-transform: uppercase;
  }
  thead tr th.col-klant,
  thead tr th.col-project { text-align: left; padding-left: 12px; color: #CCC; border-right: 1px solid #484848; }
  thead tr th.th-current  { background: #C45B0E !important; color: #fff !important; }
  thead tr th.th-past     { color: #666 !important; }
  thead tr th.th-future   { color: #999; }

  tbody tr { border-bottom: 1px solid #F2F2F2; }
  tbody tr:hover { background: #FDF5EF; }

  td { height: 36px; vertical-align: middle; padding: 0 3px; font-size: 11px; }
  td.col-klant {
    padding-left: 12px; font-weight: 600; color: #2E2E2E; font-size: 11px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    border-right: 1px solid #F0F0F0;
  }
  td.col-project {
    padding-left: 10px; color: #777; font-size: 10.5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    border-right: 1px solid #F0F0F0;
  }

  td.col-past    { background: #FAFAFA; }
  td.col-current { background: #FFF8F3; }

  td.bar-cell { padding: 5px 3px; }

  .bar {
    display: block; width: 100%; border-radius: 3px;
    padding: 3px 5px; font-size: 9px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    height: 24px; line-height: 18px;
  }
  .bar-klant        { background: #C45B0E; color: #fff; }
  .bar-klant.past   { background: #EABEAA; color: #C45B0E; }
  .bar-sales        { background: #1A6FB5; color: #fff; }
  .bar-sales.past   { background: #AACDE8; color: #1A6FB5; }

  .bar.start  { border-radius: 4px 0 0 4px; }
  .bar.mid    { border-radius: 0; }
  .bar.end    { border-radius: 0 4px 4px 0; }
  .bar.single { border-radius: 4px; }

  /* Section rows */
  tr.sec-row td {
    background: #F7F7F7; font-size: 9.5px; font-weight: 700; color: #AAA;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 5px 12px;
    border-top: 2px solid #EBEBEB;
    border-bottom: 1px solid #EBEBEB;
  }

  /* Count row */
  tr.count-row td {
    background: #F7F7F7; padding: 7px 3px;
    text-align: center; font-size: 10px; font-weight: 700; color: #BBB;
    border-top: 2px solid #E8E8E8;
  }
  tr.count-row td.col-klant {
    text-align: left; padding-left: 12px; font-size: 10px; color: #999;
  }
  tr.count-row td .n { color: #C45B0E; font-size: 14px; }
  tr.count-row td.col-past .n { color: #CCC; }
  tr.count-row td.col-current .n { color: #C45B0E; font-size: 15px; }

  /* NNB */
  tr.nnb-row td.col-klant   { color: #BBB; font-weight: 500; font-size: 10.5px; }
  tr.nnb-row td.col-project { color: #CCC; font-size: 10.5px; }
  .nnb-tag {
    display: inline-block; background: #F0F0F0; color: #C0C0C0;
    font-size: 8.5px; border-radius: 3px; padding: 2px 8px;
    font-weight: 700; letter-spacing: .5px;
  }

  /* Badge */
  .badge {
    display: inline-block; font-size: 7.5px; font-weight: 700;
    padding: 1px 4px; border-radius: 2px; letter-spacing: .5px;
    vertical-align: middle; margin-left: 5px;
  }
  .badge-klant { background: #FAE8D9; color: #C45B0E; }
  .badge-sales  { background: #E0EEF8; color: #1A6FB5; }

  .footer {
    margin-top: 12px; text-align: center;
    font-size: 10px; color: #CCC;
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-left">
      <h1>TWC IT Solutions &nbsp;·&nbsp; Projectplanning 2026</h1>
      <p>Alleen projecten met een vastgestelde planning worden getoond &nbsp;·&nbsp; NNB staat onderaan</p>
    </div>
    <div class="header-right">
      <div class="cur-month" id="curMonthLabel">–</div>
      <div class="meta" id="metaLabel">2026</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-klant"></div> Klant-gestuurd</div>
    <div class="legend-item"><div class="legend-dot dot-sales"></div> Sales-gestuurd</div>
    <div class="legend-item"><div class="legend-dot dot-past"></div> Verstreken maanden</div>
    <span class="right">Huidige maand is oranje gemarkeerd &nbsp;·&nbsp; Klik op een rij om te selecteren</span>
  </div>

  <div class="grid-wrap">
    <table id="planTable">
      <thead>
        <tr id="monthHeader">
          <th class="col-klant">Klant</th>
          <th class="col-project">Project</th>
        </tr>
      </thead>
      <tbody id="planBody"></tbody>
    </table>
  </div>

  <div class="footer" id="footerLabel"></div>
</div>

<script>
const DATA = [
  // Actieve planning — Klant
  {k:"ASV Automobielbedrijven",    p:"Vervanging Infrastructuur",          t:"Klant", s:1,  n:5},
  {k:"Connection-SGGZ",            p:"RBAC-Datamigratie SharePoint",        t:"Klant", s:2,  n:4},
  {k:"Geeqs",                      p:"Vervanging netwerk",                  t:"Klant", s:3,  n:4},
  {k:"Kloosterhotel ZIN",          p:"TWC Workplace",                       t:"Klant", s:1,  n:4},
  {k:"Van Doorne's Machinefabriek",p:"Vervanging server",                  t:"Klant", s:3,  n:4},
  {k:"Kloosterhotel ZIN",          p:"Vervanging Netwerk",                  t:"Klant", s:4,  n:5},
  {k:"Leermakers Accountants",     p:"FDS migratie",                        t:"Klant", s:4,  n:5},
  {k:"Synaxion B.V.",              p:"Uitfaseren Servers",                  t:"Klant", s:4,  n:5},
  {k:"PGZ Service",                p:"Vervanging netwerk PCM",              t:"Klant", s:5,  n:5},
  {k:"Econox B.V.",                p:"Migratie Productieomgeving",          t:"Klant", s:6,  n:7},
  // Actieve planning — Sales
  {k:"Econox B.V.",                p:"Vervanging Netwerk",                  t:"Sales", s:4,  n:6},
  {k:"Geevers Auto Parts",         p:"Verhuizing Westfield 1010",           t:"Sales", s:4,  n:9},
  {k:"Bazelmans AV",               p:"Netwerk vervanging",                  t:"Sales", s:5,  n:5},
  {k:"Diego",                      p:"TWC Workplace",                       t:"Sales", s:5,  n:6},
  {k:"Metabletica",                p:"TWC Workplace",                       t:"Sales", s:6,  n:7},
  {k:"TBRM Group B.V.",            p:"Blueprint startups",                  t:"Sales", s:5,  n:7},
  {k:"TBRM Group B.V.",            p:"Vervanging hardware",                 t:"Sales", s:5,  n:7},
  {k:"Th. Van Kasteren",           p:"TWC Workplace + Server",              t:"Sales", s:5,  n:6},
  {k:"Geeqs",                      p:"TWC Workplace",                       t:"Sales", s:8,  n:12},
  // NNB
  {k:"013 Poppodium",              p:"TWC Workplace",                       t:"Sales", s:0,  n:0},
  {k:"Bobo's",                     p:"TWC Workplace",                       t:"Sales", s:0,  n:0},
  {k:"Celegence",                  p:"Nieuwe Infrastructuur",               t:"Sales", s:0,  n:0},
  {k:"DPI",                        p:"Nieuwe infrastructuur",               t:"Sales", s:0,  n:0},
  {k:"EFTIN",                      p:"TWC365Beheer",                        t:"Sales", s:0,  n:0},
  {k:"Leermakers Accountants",     p:"Firewall redundant maken",            t:"Sales", s:0,  n:0},
  {k:"PPJJ",                       p:"TWC 365Beheer",                       t:"Sales", s:0,  n:0},
  {k:"Willems & Smeets Notarissen",p:"Nieuwe klant",                        t:"Sales", s:0,  n:0},
  {k:"WTC/e",                      p:"TWC Workplace",                       t:"Sales", s:0,  n:0},
];

const MONTHS      = ["Jan","Feb","Mrt","Apr","Mei","Jun","Jul","Aug","Sep","Okt","Nov","Dec"];
const MONTHS_FULL = ["Januari","Februari","Maart","April","Mei","Juni","Juli","Augustus","September","Oktober","November","December"];

const TODAY  = new Date();
const CUR_M  = TODAY.getMonth() + 1;
const CUR_Y  = TODAY.getFullYear();

document.getElementById("curMonthLabel").textContent = MONTHS_FULL[CUR_M-1] + " " + CUR_Y;

const active = DATA.filter(d => d.s > 0).sort((a,b) => a.s !== b.s ? a.s-b.s : a.k.localeCompare(b.k));
const nnb    = DATA.filter(d => d.s === 0).sort((a,b) => a.k.localeCompare(b.k));

document.getElementById("metaLabel").textContent =
  CUR_Y + "  ·  Intern overzicht  ·  " + active.length + " projecten ingepland  ·  " + nnb.length + " NNB";

// Build month headers
const thead = document.getElementById("monthHeader");
for (let m = 1; m <= 12; m++) {
  const th = document.createElement("th");
  th.className = "col-month";
  th.textContent = MONTHS[m-1];
  if (m === CUR_M)      th.classList.add("th-current");
  else if (m < CUR_M)   th.classList.add("th-past");
  else                   th.classList.add("th-future");
  thead.appendChild(th);
}

const tbody = document.getElementById("planBody");
const countPerMonth = Array(13).fill(0);

function addSecRow(label) {
  const tr = document.createElement("tr");
  tr.className = "sec-row";
  tr.innerHTML = `<td colspan="14">${label}</td>`;
  tbody.appendChild(tr);
}

function makeBarCell(m, proj) {
  const td = document.createElement("td");
  td.className = "bar-cell";
  if (m < CUR_M)      td.classList.add("col-past");
  else if (m === CUR_M) td.classList.add("col-current");

  if (m >= proj.s && m <= proj.n) {
    countPerMonth[m]++;
    const bar = document.createElement("span");
    const isPast = proj.n < CUR_M;
    let cls = `bar bar-${proj.t.toLowerCase()}${isPast ? " past" : ""}`;
    if (proj.s === proj.n) cls += " single";
    else if (m === proj.s) cls += " start";
    else if (m === proj.n) cls += " end";
    else                   cls += " mid";
    bar.className = cls;
    if (m === proj.s) bar.textContent = proj.p;
    td.appendChild(bar);
  }
  return td;
}

// Active rows
addSecRow(`Projecten met vastgestelde planning &nbsp;—&nbsp; ${active.length} projecten`);

active.forEach(proj => {
  const tr = document.createElement("tr");
  tr.style.cursor = "pointer";
  tr.onclick = () => tr.style.background = tr._sel ? "" : "#FFF0E6",
  tr._sel = false;

  const tdK = document.createElement("td");
  tdK.className = "col-klant";
  tdK.title = proj.k;
  tdK.textContent = proj.k;
  tr.appendChild(tdK);

  const tdP = document.createElement("td");
  tdP.className = "col-project";
  tdP.title = proj.p;
  tdP.innerHTML = proj.p + ` <span class="badge badge-${proj.t.toLowerCase()}">${proj.t.toUpperCase()}</span>`;
  tr.appendChild(tdP);

  for (let m = 1; m <= 12; m++) tr.appendChild(makeBarCell(m, proj));
  tbody.appendChild(tr);
});

// Count row
const cRow = document.createElement("tr");
cRow.className = "count-row";
const tdCL = document.createElement("td");
tdCL.className = "col-klant";
tdCL.textContent = "Actieve projecten per maand";
cRow.appendChild(tdCL);
const tdCE = document.createElement("td");
tdCE.className = "col-project";
cRow.appendChild(tdCE);
for (let m = 1; m <= 12; m++) {
  const td = document.createElement("td");
  td.className = "col-month";
  if (m < CUR_M)      td.classList.add("col-past");
  else if (m === CUR_M) td.classList.add("col-current");
  const n = countPerMonth[m];
  td.innerHTML = n > 0 ? `<span class="n">${n}</span>` : `<span style="color:#DDD">–</span>`;
  cRow.appendChild(td);
}
tbody.appendChild(cRow);

// NNB rows
if (nnb.length > 0) {
  addSecRow(`Nog niet begroot / planning nog niet vastgesteld &nbsp;—&nbsp; ${nnb.length} projecten`);
  nnb.forEach((proj, idx) => {
    const tr = document.createElement("tr");
    tr.className = "nnb-row";

    const tdK = document.createElement("td");
    tdK.className = "col-klant";
    tdK.textContent = proj.k;
    tr.appendChild(tdK);

    const tdP = document.createElement("td");
    tdP.className = "col-project";
    tdP.innerHTML = proj.p + ` <span class="badge badge-${proj.t.toLowerCase()}">${proj.t.toUpperCase()}</span>`;
    tr.appendChild(tdP);

    for (let m = 1; m <= 12; m++) {
      const td = document.createElement("td");
      td.className = "bar-cell";
      if (m === 6 && idx === Math.floor(nnb.length / 2)) {
        td.innerHTML = `<span class="nnb-tag">NNB</span>`;
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });
}

document.getElementById("footerLabel").textContent =
  `TWC IT Solutions B.V.  ·  Projectplanning ${CUR_Y}  ·  Intern document  ·  Bijgewerkt: ${TODAY.toLocaleDateString('nl-NL')}`;
</script>
</body>
</html>
</html>
