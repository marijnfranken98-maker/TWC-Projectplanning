<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>TWC Projectplanning 2026</title>
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  body {
    font-family:'Segoe UI',Calibri,Arial,sans-serif;
    background:#E8E8E8;
    color:#1A1A1A;
    padding:18px 22px;
    min-height:100vh;
  }
  .page { max-width:1876px; margin:0 auto; }

  /* ── HEADER ─────────────────────────────────── */
  .header {
    display:flex; justify-content:space-between; align-items:center;
    background:#fff; border-left:6px solid #C45B0E;
    padding:13px 20px; margin-bottom:12px; border-radius:3px;
    box-shadow:0 1px 5px rgba(0,0,0,.10);
  }
  .header h1   { font-size:17px; font-weight:800; color:#1A1A1A; letter-spacing:.2px; }
  .header p    { font-size:11px; color:#888; margin-top:3px; }
  .header-right .cur  { font-size:14px; font-weight:800; color:#C45B0E; text-align:right; }
  .header-right .meta { font-size:10px; color:#AAA; margin-top:2px; text-align:right; }

  /* ── LEGEND ──────────────────────────────────── */
  .legend {
    display:flex; gap:20px; align-items:center;
    background:#fff; border-radius:3px;
    padding:7px 14px; margin-bottom:12px;
    box-shadow:0 1px 4px rgba(0,0,0,.07);
    font-size:11px; font-weight:600; color:#444;
  }
  .legend-item { display:flex; align-items:center; gap:7px; }
  .ld { width:14px; height:14px; border-radius:2px; flex-shrink:0; }
  .ld-k { background:#C45B0E; }
  .ld-s { background:#1764A8; }
  .ld-p { background:#B0B0B0; }
  .legend .right { margin-left:auto; font-size:10px; color:#BBB; font-weight:400; }

  /* ── TABLE WRAPPER ───────────────────────────── */
  .grid-wrap {
    background:#fff; border-radius:4px;
    box-shadow:0 1px 8px rgba(0,0,0,.10); overflow:hidden;
  }
  table { width:100%; border-collapse:collapse; table-layout:fixed; }

  /* Column widths — 1920 optimised */
  .col-klant    { width:185px; }
  .col-project  { width:205px; }
  .col-eng      { width:145px; }
  .col-month    { width:calc((100% - 535px) / 12); min-width:60px; }

  /* ── THEAD ───────────────────────────────────── */
  thead th {
    background:#2E2E2E;
    font-size:10.5px; font-weight:700;
    color:#B0B0B0; padding:9px 4px;
    text-align:center;
    border-right:1px solid #3E3E3E;
    position:sticky; top:0; z-index:10;
    letter-spacing:.5px; text-transform:uppercase;
  }
  thead th.col-klant,
  thead th.col-project,
  thead th.col-eng { text-align:left; padding-left:11px; color:#DDD; }
  thead th.th-cur  { background:#C45B0E !important; color:#fff !important; font-size:11px; }
  thead th.th-past { color:#606060 !important; }
  thead th.th-fut  { color:#909090; }

  /* ── ROWS ────────────────────────────────────── */
  tbody tr { border-bottom:1px solid #EFEFEF; }
  tbody tr:hover { background:#FDF2EB; }

  td {
    height:38px; vertical-align:middle;
    padding:0 3px; font-size:11.5px;
  }
  td.col-klant {
    padding-left:11px; font-weight:700; color:#1A1A1A;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    border-right:1px solid #EFEFEF;
  }
  td.col-project {
    padding-left:9px; color:#333; font-size:11px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    border-right:1px solid #F5F5F5;
  }
  td.col-eng {
    padding-left:9px; color:#666; font-size:10.5px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    border-right:1px solid #EFEFEF;
    font-style:italic;
  }

  td.cp { background:#F8F8F8; }           /* past col */
  td.cc { background:#FFF6EF; }           /* current col */

  /* ── GANTT BARS ──────────────────────────────── */
  td.bar-cell { padding:5px 2px; }

  .bar {
    display:block; width:100%;
    border-radius:3px; padding:3px 6px;
    font-size:9.5px; font-weight:700;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    height:26px; line-height:20px;
  }

  /* Klant = orange */
  .bk      { background:#C45B0E; color:#fff; }
  .bk.past { background:#DCA882; color:#fff; }

  /* Sales = blue */
  .bs      { background:#1764A8; color:#fff; }
  .bs.past { background:#7AABD4; color:#fff; }

  /* Radius by position */
  .bar.single { border-radius:4px; }
  .bar.start  { border-radius:4px 0 0 4px; }
  .bar.mid    { border-radius:0; border-left:1px solid rgba(255,255,255,.15); }
  .bar.end    { border-radius:0 4px 4px 0; }

  /* ── SECTION ROW ─────────────────────────────── */
  tr.sec td {
    background:#F2F2F2; color:#888;
    font-size:9.5px; font-weight:700;
    letter-spacing:1px; text-transform:uppercase;
    padding:5px 11px;
    border-top:2px solid #E4E4E4;
    border-bottom:1px solid #E8E8E8;
  }

  /* ── COUNT ROW ───────────────────────────────── */
  tr.ctr td {
    background:#F4F4F4;
    text-align:center; padding:7px 3px;
    font-size:10px; font-weight:700; color:#AAA;
    border-top:2px solid #E4E4E4;
  }
  tr.ctr td.col-klant { text-align:left; padding-left:11px; font-size:10.5px; color:#888; }
  tr.ctr .n     { color:#C45B0E; font-size:15px; }
  tr.ctr .np    { color:#B0B0B0; font-size:14px; }
  tr.ctr .nc    { color:#C45B0E; font-size:16px; }

  /* ── NNB ROWS ────────────────────────────────── */
  tr.nnb td.col-klant   { color:#AAAAAA; font-weight:600; }
  tr.nnb td.col-project { color:#BBBBBB; }
  tr.nnb td.col-eng     { color:#CCCCCC; font-style:italic; }
  .nnb-tag {
    display:inline-block; background:#EBEBEB; color:#AAAAAA;
    font-size:9px; border-radius:3px; padding:2px 8px;
    font-weight:700; letter-spacing:.5px;
  }

  /* ── BADGE ───────────────────────────────────── */
  .badge {
    display:inline-block; font-size:7.5px; font-weight:700;
    padding:1px 5px; border-radius:2px; letter-spacing:.5px;
    vertical-align:middle; margin-left:5px;
  }
  .bk-badge { background:#FAE8D9; color:#C45B0E; }
  .bs-badge { background:#DDE9F5; color:#1764A8; }

  .footer {
    margin-top:11px; text-align:center;
    font-size:10px; color:#B0B0B0;
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div>
      <h1>TWC IT Solutions &nbsp;·&nbsp; Projectplanning 2026</h1>
      <p>Projecten met vastgestelde planning</p>
    </div>
    <div class="header-right">
      <div class="cur"  id="hCur">–</div>
      <div class="meta" id="hMeta">2026</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="ld ld-k"></div>Klant-gestuurd</div>
    <div class="legend-item"><div class="ld ld-s"></div>Sales-gestuurd</div>
    <div class="legend-item"><div class="ld ld-p"></div>Verstreken maanden</div>
    <span class="right">Huidige maand = oranje kolomkop &nbsp;·&nbsp; NNB-projecten hebben geen balk</span>
  </div>

  <div class="grid-wrap">
    <table>
      <thead><tr id="hdr">
        <th class="col-klant">Klant</th>
        <th class="col-project">Project</th>
        <th class="col-eng">Engineers</th>
      </tr></thead>
      <tbody id="tb"></tbody>
    </table>
  </div>

  <div class="footer" id="ft"></div>
</div>

<script>
// e = engineers
const DATA = [
  // ── Klant-gestuurd ────────────────────────────────────────
  {k:"ASV Automobielbedrijven",     p:"Vervanging Infrastructuur",       e:"Mitchell, Dennis",  t:"K", s:1, n:5},
  {k:"Connection-SGGZ",             p:"RBAC-Datamigratie SharePoint",    e:"Mitchell",          t:"K", s:2, n:4},
  {k:"Geeqs",                       p:"Vervanging netwerk",              e:"Tom, Luke, Bas",    t:"K", s:3, n:4},
  {k:"Kloosterhotel ZIN",           p:"TWC Workplace",                   e:"Ron, Dennis",       t:"K", s:1, n:4},
  {k:"Van Doorne's Machinefabriek", p:"Vervanging server",               e:"Stef L, Dennis",   t:"K", s:3, n:4},
  {k:"Kloosterhotel ZIN",           p:"Vervanging Netwerk",              e:"Ron, Dennis",       t:"K", s:4, n:5},
  {k:"Leermakers Accountants",      p:"FDS migratie",                    e:"Dennis",            t:"K", s:4, n:5},
  {k:"Synaxion B.V.",               p:"Uitfaseren Servers",              e:"Bas",               t:"K", s:4, n:5},
  {k:"PGZ Service",                 p:"Vervanging netwerk PCM",          e:"Dennis, Mitchell",  t:"K", s:5, n:5},
  {k:"Econox B.V.",                 p:"Migratie Productieomgeving",      e:"Jan-Jaap, Bas",     t:"K", s:6, n:7},
  // ── Sales-gestuurd ────────────────────────────────────────
  {k:"Econox B.V.",                 p:"Vervanging Netwerk",              e:"Bas, Jan-Jaap",     t:"S", s:4, n:6},
  {k:"Geevers Auto Parts",          p:"Verhuizing Westfield 1010",       e:"Bas, Mitchell",     t:"S", s:4, n:9},
  {k:"Bazelmans AV",                p:"Netwerk vervanging",              e:"Luke, Dennis",      t:"S", s:5, n:5},
  {k:"Diego",                       p:"TWC Workplace",                   e:"Luke",              t:"S", s:5, n:6},
  {k:"Metabletica",                 p:"TWC Workplace",                   e:"Tom",               t:"S", s:6, n:7},
  {k:"TBRM Group B.V.",             p:"Blueprint startups",              e:"Jelle B",           t:"S", s:5, n:7},
  {k:"TBRM Group B.V.",             p:"Vervanging hardware",             e:"Jelle B",           t:"S", s:5, n:7},
  {k:"Th. Van Kasteren",            p:"TWC Workplace + Server",          e:"Bas",               t:"S", s:5, n:6},
  {k:"Geeqs",                       p:"TWC Workplace",                   e:"Luke, Tom",         t:"S", s:8, n:12},
  // ── NNB ───────────────────────────────────────────────────
  {k:"013 Poppodium",               p:"TWC Workplace",                   e:"–",                 t:"S", s:0, n:0},
  {k:"Bobo's",                      p:"TWC Workplace",                   e:"–",                 t:"S", s:0, n:0},
  {k:"Celegence",                   p:"Nieuwe Infrastructuur",           e:"Bas, Jelle B",      t:"S", s:0, n:0},
  {k:"DPI",                         p:"Nieuwe infrastructuur",           e:"–",                 t:"S", s:0, n:0},
  {k:"EFTIN",                       p:"TWC365Beheer",                    e:"–",                 t:"S", s:0, n:0},
  {k:"Leermakers Accountants",      p:"Firewall redundant maken",        e:"–",                 t:"S", s:0, n:0},
  {k:"PPJJ",                        p:"TWC 365Beheer",                   e:"–",                 t:"S", s:0, n:0},
  {k:"Willems & Smeets Notarissen", p:"Nieuwe klant",                    e:"–",                 t:"S", s:0, n:0},
  {k:"WTC/e",                       p:"TWC Workplace",                   e:"–",                 t:"S", s:0, n:0},
];

const MON  = ["Jan","Feb","Mrt","Apr","Mei","Jun","Jul","Aug","Sep","Okt","Nov","Dec"];
const MFUL = ["Januari","Februari","Maart","April","Mei","Juni","Juli",
              "Augustus","September","Oktober","November","December"];

const now  = new Date();
const CM   = now.getMonth() + 1;
const CY   = now.getFullYear();

document.getElementById("hCur").textContent  = MFUL[CM-1] + " " + CY;

const active = DATA.filter(d=>d.s>0).sort((a,b)=> a.s!==b.s ? a.s-b.s : a.k.localeCompare(b.k));
const nnb    = DATA.filter(d=>d.s===0).sort((a,b)=> a.k.localeCompare(b.k));

document.getElementById("hMeta").textContent =
  CY + "  ·  " + active.length + " projecten ingepland  ·  " + nnb.length + " NNB";

// Month headers
const hdr = document.getElementById("hdr");
for (let m=1; m<=12; m++) {
  const th = document.createElement("th");
  th.className = "col-month";
  th.textContent = MON[m-1];
  th.classList.add(m===CM ? "th-cur" : m<CM ? "th-past" : "th-fut");
  hdr.appendChild(th);
}

const tb  = document.getElementById("tb");
const cnt = Array(13).fill(0);

function secRow(html) {
  const tr = document.createElement("tr");
  tr.className = "sec";
  tr.innerHTML = `<td colspan="15">${html}</td>`;
  tb.appendChild(tr);
}

function cellClass(m) {
  return m < CM ? "cp" : m === CM ? "cc" : "";
}

// ── Active rows ───────────────────────────────────────────────
secRow(`Projecten met vastgestelde planning &nbsp;—&nbsp; <strong>${active.length}</strong> projecten`);

active.forEach(proj => {
  const isPast = proj.n < CM;
  const isSales = proj.t === "S";
  const barBase = isSales ? "bar bs" : "bar bk";
  const badge   = isSales
    ? `<span class="badge bs-badge">SALES</span>`
    : `<span class="badge bk-badge">KLANT</span>`;

  const tr = document.createElement("tr");

  // Klant
  const tdK = document.createElement("td");
  tdK.className = "col-klant"; tdK.title = proj.k; tdK.textContent = proj.k;
  tr.appendChild(tdK);

  // Project + badge
  const tdP = document.createElement("td");
  tdP.className = "col-project"; tdP.title = proj.p;
  tdP.innerHTML = proj.p + badge;
  tr.appendChild(tdP);

  // Engineers
  const tdE = document.createElement("td");
  tdE.className = "col-eng"; tdE.title = proj.e; tdE.textContent = proj.e;
  tr.appendChild(tdE);

  // Month cells
  for (let m=1; m<=12; m++) {
    const td = document.createElement("td");
    td.className = "bar-cell " + cellClass(m);

    if (m >= proj.s && m <= proj.n) {
      cnt[m]++;
      const bar = document.createElement("span");
      let cls = barBase + (isPast ? " past" : "");
      if      (proj.s === proj.n) cls += " single";
      else if (m === proj.s)      cls += " start";
      else if (m === proj.n)      cls += " end";
      else                        cls += " mid";
      bar.className = cls;
      if (m === proj.s) bar.textContent = proj.p;
      td.appendChild(bar);
    }
    tr.appendChild(td);
  }
  tb.appendChild(tr);
});

// ── Count row ─────────────────────────────────────────────────
const ctr = document.createElement("tr");
ctr.className = "ctr";
const cL = document.createElement("td");
cL.className = "col-klant"; cL.textContent = "Actieve projecten per maand";
ctr.appendChild(cL);
["col-project","col-eng"].forEach(c => {
  const td = document.createElement("td"); td.className = c; ctr.appendChild(td);
});
for (let m=1; m<=12; m++) {
  const td = document.createElement("td");
  td.className = "col-month " + cellClass(m);
  const n = cnt[m];
  if (n > 0) {
    const cls = m < CM ? "np" : m === CM ? "nc" : "n";
    td.innerHTML = `<span class="${cls}">${n}</span>`;
  } else {
    td.innerHTML = `<span style="color:#DDD">–</span>`;
  }
  ctr.appendChild(td);
}
tb.appendChild(ctr);

// ── NNB rows ──────────────────────────────────────────────────
if (nnb.length) {
  secRow(`Nog niet begroot / planning nog niet vastgesteld &nbsp;—&nbsp; <strong>${nnb.length}</strong> projecten`);
  nnb.forEach((proj, idx) => {
    const isSales = proj.t === "S";
    const badge = isSales
      ? `<span class="badge bs-badge">SALES</span>`
      : `<span class="badge bk-badge">KLANT</span>`;

    const tr = document.createElement("tr");
    tr.className = "nnb";

    const tdK = document.createElement("td");
    tdK.className = "col-klant"; tdK.textContent = proj.k;
    tr.appendChild(tdK);

    const tdP = document.createElement("td");
    tdP.className = "col-project";
    tdP.innerHTML = proj.p + badge;
    tr.appendChild(tdP);

    const tdE = document.createElement("td");
    tdE.className = "col-eng"; tdE.textContent = proj.e;
    tr.appendChild(tdE);

    for (let m=1; m<=12; m++) {
      const td = document.createElement("td");
      td.className = "bar-cell";
      if (m === 6) td.innerHTML = `<span class="nnb-tag">NNB</span>`;
      tr.appendChild(td);
    }
    tb.appendChild(tr);
  });
}

document.getElementById("ft").textContent =
  `TWC IT Solutions B.V.  ·  Projectplanning ${CY}  ·  Intern document  ·  Bijgewerkt: ${now.toLocaleDateString('nl-NL')}`;
</script>
</body>
</html>
